{% set name = "simplesat" %}
{% set version = "0.9.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8cb800d09289bdc051126e725949368f8ac25105d40865cb93aa20eae9d46a9c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=17.4.0
    - okonomiyaki >=0.16.6
    - six >=1.10.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - simplesat

about:
  home: https://github.com/enthought/sat-solver
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: 'SAT solver for use in Enstaller, based on the MiniSat implementation'

extra:
  recipe-maintainers:
    - hmaarrfk
